# Public example command schema.
# Replace with your mission-specific command definitions locally.

defaults:
  echo: NONE
  ptype: CMD

commands:
  ping:
    dest: NODE_A
    tx_args: []
    rx_args:
      - {name: Response, type: str, important: true}

  set_mode:
    nodes: [NODE_A, NODE_B]
    tx_args:
      - {name: Mode, type: str, important: true}
    rx_args:
      - {name: Status, type: str, important: true}

  tlm_beacon:
    rx_only: true
    ptype: TLM
    rx_args:
      - {name: Beacon Type, type: int, important: true}
      - {name: Unix Time, type: epoch_ms, important: true}
