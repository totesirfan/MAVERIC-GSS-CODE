# MAVERIC mission database (PUBLIC-SAFE TEMPLATE).
#
# This file is the committed reference. The real, gitignored copy
# lives at mav_gss_lib/missions/maveric/mission.yml and contains the
# full command catalog and bitfield definitions.
#
# Author: Irfan Annuar - USC ISI SERC

schema_version: 1

id: maveric
name: "MAVERIC CubeSat"

header:
  version: "0.1.0"
  date: "2026-04-25"
  description: "MAVERIC declarative mission database (template)"

extensions:
  nodes:
    NONE: 0
    LPPM: 1
    EPS: 2
    UPPM: 3
    HLNV: 4
    ASTR: 5
    GS: 6
    FTDI: 7
  ptypes:
    CMD: 1
    RES: 2
    ACK: 3
    TLM: 4
    FILE: 5
  node_descriptions:
    LPPM: "Low-power power manager"
    EPS: "Electrical power system"
    UPPM: "Upper-power power manager"
    HLNV: "Helio-low NavCam node"
    ASTR: "AstroCam node"
    GS: "Ground station"
    FTDI: "Bench FTDI test endpoint"
  gs_node: GS

parameter_types:
  V_milli_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    calibrator:
      polynomial: [0.0, 0.001]
    unit: "V"
    description: "Voltage in millivolts (LE int16); engineering = mV * 1e-3"

  I_milli_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    calibrator:
      polynomial: [0.0, 0.001]
    unit: "A"
    description: "Current in milliamps (LE int16)"

  P_milli_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    calibrator:
      polynomial: [0.0, 0.001]
    unit: "W"
    description: "Power in milliwatts (LE int16)"

  TS_ADC_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    calibrator:
      polynomial: [0.0, 0.0976563]
    unit: "%"
    description: "EPS thermistor ADC reading (×0.0976563 %)"

  T_DIE_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    calibrator:
      polynomial: [0.0, 0.5]
    unit: "°C"
    description: "EPS die temperature (×0.5 °C)"

  T_RAW_i16:
    kind: int
    size_bits: 16
    signed: true
    byte_order: little
    unit: "°C"
    description: "Pre-scaled ADCS temperature reading (signed int16)"

  rate_rad_s:
    kind: float
    size_bits: 32
    byte_order: little
    unit: "rad/s"
    description: "Angular rate component"

  mag_nT:
    kind: float
    size_bits: 32
    byte_order: little
    unit: "nT"
    description: "Magnetometer field component"

  mtq_dipole_Am2:
    kind: float
    size_bits: 32
    byte_order: little
    unit: "A.m^2"
    description: "Magnetorquer dipole moment"

  temp_C_f32:
    kind: float
    size_bits: 32
    byte_order: little
    unit: "°C"
    description: "Generic float temperature"

  battery_voltage_f32:
    kind: float
    size_bits: 32
    byte_order: little
    unit: "V"
    description: "Battery voltage as float (PWR_VOL_5V/3V scalar)"

  generic_f32:
    kind: float
    size_bits: 32
    byte_order: little
    description: "Untyped 32-bit float"

parameters: {}

bitfield_types: {}

sequence_containers: {}

meta_commands: {}
